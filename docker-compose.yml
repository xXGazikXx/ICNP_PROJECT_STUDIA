services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:-zmien_mnie_123}
      MARIADB_DATABASE: ${DB_NAME:-icnp_db}
      MARIADB_USER: ${DB_USER:-icnp_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-zmien_mnie_123}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-icnp_db}
      DB_USER: ${DB_USER:-icnp_user}
      DB_PASSWORD: ${DB_PASSWORD:-zmien_mnie_123}
      JWT_SECRET: ${JWT_SECRET:-zmien_ten_sekret_na_cos_losowego}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      PORT: 5000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  db_data:
